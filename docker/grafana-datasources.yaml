apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    isDefault: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: true
        customQuery: true
        query: '{service_name=~"sliderule-citus|sliderule-cockroachdb"} |= "trace_id=${__trace.traceId}"'
    editable: true
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: false
    editable: true

  - name: Loki
    type: loki
    access: proxy
    uid: loki
    url: http://loki:3100
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: "trace_id=([0-9a-f]{32})"
          datasourceUid: tempo
          url: "$${__value.raw}"
        - name: SpanID
          matcherRegex: "span_id=([0-9a-f]{16})"
          url: "$${__value.raw}"
    editable: false
