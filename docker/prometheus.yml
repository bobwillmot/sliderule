global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: sliderule-app-metrics
    static_configs:
      - targets:
          - host.docker.internal:9464
        labels:
          service: sliderule-citus
      - targets:
          - host.docker.internal:9465
        labels:
          service: sliderule-cockroachdb
